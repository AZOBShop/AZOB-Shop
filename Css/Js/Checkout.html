<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - AZOB SHOP</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="center">
    <h2>Checkout</h2>
  </div>
  <div style="max-width:500px; margin:40px auto; padding:20px; background:rgba(255,255,255,0.05); border-radius:16px;">
    <input type="text" placeholder="Full Name" style="width:100%; padding:14px; margin:10px 0; border-radius:8px; border:none;"><br>
    <input type="text" placeholder="Address" style="width:100%; padding:14px; margin:10px 0; border-radius:8px; border:none;"><br>
    <input type="tel" placeholder="Phone Number" style="width:100%; padding:14px; margin:10px 0; border-radius:8px; border:none;"><br>
    <input type="email" placeholder="Email" style="width:100%; padding:14px; margin:10px 0; border-radius:8px; border:none;"><br>
    <button class="add-btn" style="width:100%; margin-top:20px;">Submit Order</button>
  </div>
</body>
</html>
