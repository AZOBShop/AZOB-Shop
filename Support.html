<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support - AZOB SHOP</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="center">
    <h2>Support / Report</h2>
  </div>
  <div style="max-width:500px; margin:40px auto; padding:20px; background:rgba(255,255,255,0.05); border-radius:16px;">
    <h3>Support Form</h3>
    <input type="text" placeholder="Your Name" style="width:100%; padding:14px; margin:10px 0; border-radius:8px; border:none;"><br>
    <input type="email" placeholder="Your Email" style="width:100%; padding:14px; margin:10px 0; border-radius:8px; border:none;"><br>
    <textarea placeholder="Message" rows="5" style="width:100%; padding:14px; margin:10px 0; border-radius:8px; border:none;"></textarea><br>
    <button class="add-btn" style="width:100%;">Submit</button>
  </div>
</body>
</html>
