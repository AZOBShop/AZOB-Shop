<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AZOB SHOP</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <header>
    <div class="menu-btn" id="menuBtn"><i class="fa fa-bars"></i></div>
  </header>

  <div class="menu" id="menu">
    <a href="index.html">Home</a>
    <a href="checkout.html">Shop / Checkout</a>
    <a href="support.html">Support / Report</a>
    <a href="#">Offer</a>
    <a href="about.html">About Us</a>
  </div>

  <div class="center">
    <div class="logo">AZOB SHOP</div>
    <div class="search-box">
      <input type="text" placeholder="Search products..." id="searchInput"/>
      <i class="fa fa-search"></i>
    </div>
  </div>

  <div class="floating-search" id="floatingSearch">
    <input type="text" placeholder="Search..." id="floatingSearchInput"/>
  </div>

  <div class="bottom-menu">
    <a href="index.html"><i class="fa fa-home"></i></a>
    <a href="checkout.html"><i class="fa fa-shopping-bag"></i></a>
    <a href="#"><i class="fa fa-shopping-cart"></i></a>
    <a href="#"><i class="fa fa-user"></i></a>
  </div>

  <div class="product-grid">
    <div class="product">
      <div class="viewer-container">
        <img src="https://via.placeholder.com/300x300/1abc9c/ffffff?text=Front" alt="Product 1" class="main-img">
        <img src="https://via.placeholder.com/300x300/e74c3c/ffffff?text=Side" alt="Side" class="hover-img">
      </div>
      <div class="product-name">Neon T-Shirt</div>
      <div class="price">৳ ১,২০০</div>
      <button class="add-btn">Add to Cart</button>
    </div>

    <div class="product">
      <div class="viewer-container">
        <img src="https://via.placeholder.com/300x300/3498db/ffffff?text=Headphone" alt="Product 2" class="main-img">
        <img src="https://via.placeholder.com/300x300/2980b9/ffffff?text=Box" alt="Box" class="hover-img">
      </div>
      <div class="product-name">Wireless Headphone</div>
      <div class="price">৳ ৩,৪৯৯</div>
      <button class="add-btn">Add to Cart</button>
    </div>

    <div class="product">
      <div class="viewer-container">
        <img src="https://via.placeholder.com/300x300/9b59b6/ffffff?text=Watch" alt="Product 3" class="main-img">
        <img src="https://via.placeholder.com/300x300/8e44ad/ffffff?text=Detail" alt="Detail" class="hover-img">
      </div>
      <div class="product-name">Smart Watch Pro</div>
      <div class="price">৳ ৫,৯৯৯</div>
      <button class="add-btn">Add to Cart</button>
    </div>
  </div>

  <div class="robot"><i class="fa fa-robot"></i></div>

  <script src="js/main.js"></script>
</body>
</html>
